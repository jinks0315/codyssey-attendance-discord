name: Codyssey Attendance Alert

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check attendance
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
        run: |
          python check_attendance.py

      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add attendance_state.json || true

          git commit -m "update attendance state" || echo "No changes"

          git push || true
